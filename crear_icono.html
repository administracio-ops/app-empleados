<!DOCTYPE html>
<html>
<head><title>Crear icono</title></head>
<body>
<canvas id="c" width="512" height="512"></canvas>
<br><a id="dl" download="icon.png">Descargar icon.png</a>
<script>
const c = document.getElementById('c');
const ctx = c.getContext('2d');

// Fondo negro redondeado
ctx.fillStyle = '#0A0A0A';
ctx.beginPath();
ctx.roundRect(0, 0, 512, 512, 80);
ctx.fill();

// Círculo amarillo
ctx.fillStyle = '#FFD234';
ctx.beginPath();
ctx.arc(256, 200, 110, 0, Math.PI * 2);
ctx.fill();

// Persona (silueta simple)
ctx.fillStyle = '#0A0A0A';
// Cabeza
ctx.beginPath();
ctx.arc(256, 185, 55, 0, Math.PI * 2);
ctx.fill();
// Cuerpo
ctx.beginPath();
ctx.ellipse(256, 295, 75, 55, 0, 0, Math.PI * 2);
ctx.fill();

// Texto
ctx.fillStyle = '#FFD234';
ctx.font = 'bold 72px Arial';
ctx.textAlign = 'center';
ctx.fillText('BYLD', 256, 430);

const dl = document.getElementById('dl');
dl.href = c.toDataURL('image/png');
dl.click();
</script>
</body>
</html>
